<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#1a365d" stroke="#f7941e" stroke-width="4"/>
  
  <!-- Gear/Wrench Symbol -->
  <g transform="translate(100,100)">
    <!-- Gear -->
    <circle cx="0" cy="0" r="35" fill="#f7941e"/>
    <circle cx="0" cy="0" r="15" fill="#1a365d"/>
    
    <!-- Gear teeth -->
    <g fill="#f7941e">
      <rect x="-3" y="-45" width="6" height="10"/>
      <rect x="-3" y="35" width="6" height="10"/>
      <rect x="35" y="-3" width="10" height="6"/>
      <rect x="-45" y="-3" width="10" height="6"/>
      
      <g transform="rotate(45)">
        <rect x="-3" y="-45" width="6" height="10"/>
        <rect x="-3" y="35" width="6" height="10"/>
        <rect x="35" y="-3" width="10" height="6"/>
        <rect x="-45" y="-3" width="10" height="6"/>
      </g>
    </g>
    
    <!-- Wrench -->
    <g transform="rotate(30)" fill="#ffffff">
      <rect x="-2" y="-25" width="4" height="50" rx="2"/>
      <circle cx="0" cy="-30" r="8" fill="none" stroke="#ffffff" stroke-width="3"/>
      <circle cx="0" cy="30" r="6"/>
    </g>
  </g>
  
  <!-- Company Text -->
  <text x="100" y="170" text-anchor="middle" fill="#f7941e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">LOS PITS</text>
  <text x="100" y="185" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">SERVICIO AUTOMOTRIZ</text>
</svg>