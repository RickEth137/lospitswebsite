<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <!-- Background -->
  <rect width="900" height="600" fill="#f7fafc"/>
  
  <!-- Browser window -->
  <rect x="50" y="50" width="800" height="500" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" rx="12"/>
  
  <!-- Header bar -->
  <rect x="50" y="50" width="800" height="60" fill="#1a202c" rx="12 12 0 0"/>
  
  <!-- Window controls -->
  <circle cx="80" cy="80" r="8" fill="#f56565"/>
  <circle cx="110" cy="80" r="8" fill="#f56500"/>
  <circle cx="140" cy="80" r="8" fill="#48bb78"/>
  
  <!-- Title -->
  <text x="200" y="85" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Sistema de Gestión LOS PITS - Dashboard Principal</text>
  
  <!-- Navigation tabs -->
  <rect x="70" y="130" width="140" height="35" fill="#f56500" rx="6"/>
  <text x="140" y="152" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600">Dashboard</text>
  
  <rect x="230" y="130" width="140" height="35" fill="#e2e8f0" rx="6"/>
  <text x="300" y="152" text-anchor="middle" fill="#4a5568" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500">Flotilla</text>
  
  <rect x="390" y="130" width="140" height="35" fill="#e2e8f0" rx="6"/>
  <text x="460" y="152" text-anchor="middle" fill="#4a5568" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500">Servicios</text>
  
  <rect x="550" y="130" width="140" height="35" fill="#e2e8f0" rx="6"/>
  <text x="620" y="152" text-anchor="middle" fill="#4a5568" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500">Reportes</text>
  
  <!-- Main content area -->
  <rect x="70" y="185" width="760" height="345" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="8"/>
  
  <!-- Metric cards -->
  <!-- Active Services Card -->
  <rect x="90" y="210" width="170" height="120" fill="#f56500" rx="12"/>
  <text x="175" y="245" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">156</text>
  <text x="175" y="265" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">Servicios Activos</text>
  <text x="175" y="285" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="11" opacity="0.9">+12% este mes</text>
  <rect x="100" y="295" width="150" height="25" fill="rgba(255,255,255,0.2)" rx="12"/>
  <rect x="100" y="295" width="120" height="25" fill="rgba(255,255,255,0.4)" rx="12"/>
  
  <!-- Availability Card -->
  <rect x="280" y="210" width="170" height="120" fill="#48bb78" rx="12"/>
  <text x="365" y="245" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">98%</text>
  <text x="365" y="265" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">Disponibilidad</text>
  <text x="365" y="285" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="11" opacity="0.9">Objetivo: 95%</text>
  <circle cx="340" cy="305" r="12" fill="rgba(255,255,255,0.3)"/>
  <circle cx="365" cy="305" r="12" fill="rgba(255,255,255,0.5)"/>
  <circle cx="390" cy="305" r="12" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Units in Workshop Card -->
  <rect x="470" y="210" width="170" height="120" fill="#3182ce" rx="12"/>
  <text x="555" y="245" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">23</text>
  <text x="555" y="265" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">Unidades en Taller</text>
  <text x="555" y="285" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="11" opacity="0.9">Tiempo prom: 2.3h</text>
  <rect x="530" y="295" width="20" height="20" fill="rgba(255,255,255,0.3)" rx="2"/>
  <rect x="555" y="295" width="20" height="20" fill="rgba(255,255,255,0.5)" rx="2"/>
  
  <!-- Alerts Card -->
  <rect x="660" y="210" width="150" height="120" fill="#e53e3e" rx="12"/>
  <text x="735" y="245" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">4</text>
  <text x="735" y="265" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">Alertas Críticas</text>
  <text x="735" y="285" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="11" opacity="0.9">Requieren atención</text>
  <polygon points="725,295 735,305 745,295" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Data table -->
  <rect x="90" y="350" width="720" height="35" fill="#f7fafc"/>
  <text x="110" y="372" fill="#4a5568" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Unidad</text>
  <text x="250" y="372" fill="#4a5568" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Estado</text>
  <text x="380" y="372" fill="#4a5568" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Próximo Servicio</text>
  <text x="550" y="372" fill="#4a5568" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Técnico Asignado</text>
  <text x="720" y="372" fill="#4a5568" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Acción</text>
  
  <!-- Table rows -->
  <g fill="#718096" font-family="Inter, Arial, sans-serif" font-size="12">
    <!-- Row 1 -->
    <text x="110" y="405">CAM-001-MX</text>
    <rect x="240" y="395" width="80" height="20" fill="#48bb78" rx="10"/>
    <text x="280" y="407" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">OPERATIVO</text>
    <text x="380" y="405">15/Oct/2024</text>
    <text x="550" y="405">Juan Pérez</text>
    <rect x="700" y="395" width="70" height="20" fill="#f56500" rx="4"/>
    <text x="735" y="407" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">VER DETALLES</text>
    
    <!-- Row 2 -->
    <text x="110" y="430">VAN-045-GDL</text>
    <rect x="240" y="420" width="80" height="20" fill="#f56500" rx="10"/>
    <text x="280" y="432" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">EN SERVICIO</text>
    <text x="380" y="430">22/Oct/2024</text>
    <text x="550" y="430">María López</text>
    <rect x="700" y="420" width="70" height="20" fill="#3182ce" rx="4"/>
    <text x="735" y="432" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">PROGRAMAR</text>
    
    <!-- Row 3 -->
    <text x="110" y="455">MON-012-MTY</text>
    <rect x="240" y="445" width="80" height="20" fill="#e53e3e" rx="10"/>
    <text x="280" y="457" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">CRÍTICO</text>
    <text x="380" y="455">28/Oct/2024</text>
    <text x="550" y="455">Carlos Ruiz</text>
    <rect x="700" y="445" width="70" height="20" fill="#48bb78" rx="4"/>
    <text x="735" y="457" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">COMPLETAR</text>
    
    <!-- Row 4 -->
    <text x="110" y="480">TRK-089-PUE</text>
    <rect x="240" y="470" width="80" height="20" fill="#ffa726" rx="10"/>
    <text x="280" y="482" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">PROGRAMADO</text>
    <text x="380" y="480">30/Oct/2024</text>
    <text x="550" y="480">Ana García</text>
    <rect x="700" y="470" width="70" height="20" fill="#6b46c1" rx="4"/>
    <text x="735" y="482" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">MODIFICAR</text>
  </g>
  
  <!-- Status indicators -->
  <circle cx="820" cy="250" r="6" fill="#48bb78"/>
  <text x="835" y="255" fill="#4a5568" font-family="Inter, Arial, sans-serif" font-size="10">Sistema Online</text>
  
  <circle cx="820" cy="270" r="6" fill="#f56500"/>
  <text x="835" y="275" fill="#4a5568" font-family="Inter, Arial, sans-serif" font-size="10">Sync en Progreso</text>
  
  <!-- Mini chart -->
  <rect x="90" y="500" width="200" height="40" fill="#f7fafc" rx="4"/>
  <text x="190" y="515" text-anchor="middle" fill="#4a5568" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">Rendimiento Semanal</text>
  <polyline points="100,535 120,525 140,530 160,520 180,525 200,515 220,520 240,515 260,520 280,518" 
            fill="none" stroke="#f56500" stroke-width="2"/>
</svg>